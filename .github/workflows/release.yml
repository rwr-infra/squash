name: build-and-package

# - Any branch push triggers a build, to keep `main` green and catch breakage
#   early. No release is published for branch pushes.
# - A tag push (v*) triggers the full pipeline: build on every OS + release.
#   A tag fires the same `push` event whether created locally
#   (`git push origin v1.0.0`) or on the GitHub platform (web UI / API) — in
#   both cases `github.ref` is `refs/tags/*`, which the release job gates on.
on:
  push:
    branches: ['**']
    tags: ['v*']

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # Tag is the source of truth for the version. Strip the leading `v` and
      # stamp it into package.json so every artifact (zip/tar.gz name, bundled
      # package.json) carries the tag's version — without this, `package.json`
      # would lag behind and artifacts would be named after the stale version
      # (e.g. v0.1.1 tag still producing squash-0.1.0-* files). Only runs on tag
      # pushes; plain branch pushes leave package.json untouched.
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
        # Explicit bash: this step uses bash parameter expansion (${TAG#v}),
        # but Windows runners default to PowerShell, which can't parse it. bash
        # (Git Bash) is present on every GitHub-hosted runner, so this works
        # uniformly across the ubuntu/macos/windows matrix.
        shell: bash
        run: |
          version="${TAG#v}"
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p));j.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')" "$version"
          echo "Stamped version $version"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # build (server + frontend) + assemble the portable bundle for THIS OS.
      # node-pty is native, so each runner produces its own platform binary —
      # that is the whole reason this matrix exists.
      - name: Package
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: squash-${{ matrix.os }}
          path: |
            release/*.zip
            release/*.tar.gz
          if-no-files-found: error

  release:
    needs: package
    # Only publish on tag pushes; plain branch pushes run package for CI only.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Make the job idempotent: a re-run (retry / manual dispatch /
          # rebuilt tag) must not fail just because the release already exists.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading assets only."
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
          fi
          # --clobber overwrites any same-named assets from a previous run.
          find artifacts -type f -exec gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber {} +
